<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Optimized Scanner</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

video {
  width: 100%;
}

/* مربع المسح */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 250px;
  height: 250px;
  transform: translate(-50%, -50%);
  border: 2px solid #00ff99;
  border-radius: 12px;
}

/* خط متحرك */
.line {
  position: absolute;
  width: 100%;
  height: 3px;
  background: red;
  animation: move 1.5s infinite;
}

@keyframes move {
  0% { top: 0; }
  50% { top: 100%; }
  100% { top: 0; }
}
</style>
</head>

<body>

<video id="video" autoplay></video>

<div class="box">
  <div class="line"></div>
</div>

<p id="status">توجيه الكاميرا...</p>

<canvas id="canvas" hidden></canvas>

<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<script>

const video = document.getElementById("video");
const status = document.getElementById("status");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let scanning = true;
let lastScanTime = 0;

/* تشغيل الكاميرا */
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
})
.then(stream => {
  video.srcObject = stream;
});

/* أصوات */
const successSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

/* المسح المحسن */
function scan() {

  if (!scanning) return;

  if (video.readyState === video.HAVE_ENOUGH_DATA) {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    const code = jsQR(imageData.data, canvas.width, canvas.height);

    if (code) {

      const now = Date.now();

      // منع التكرار خلال 2 ثانية
      if (now - lastScanTime > 2000) {

        lastScanTime = now;

        scanning = false;

        status.innerText = "QR تم قراءته ✔";
        successSound.play();

        if (navigator.vibrate) {
          navigator.vibrate(200);
        }

        sendAPI(code.data);

        setTimeout(() => scanning = true, 2000);
      }
    } else {
      status.innerText = "جاري البحث...";
    }
  }

  requestAnimationFrame(scan);
}

/* API */
function sendAPI(data) {

  fetch("https://example.com/api/qr", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ qr: data })
  })
  .then(res => {
    status.innerText = "تم الإرسال ✔";
  })
  .catch(err => {
    status.innerText = "فشل الإرسال ❌";
  });
}

/* بدء المسح */
scan();

</script>

</body>
</html>
