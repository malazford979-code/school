<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast QR Scanner</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
  text-align: center;
}

video {
  width: 100%;
}

/* مربع المسح */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 240px;
  height: 240px;
  transform: translate(-50%, -50%);
  border: 2px solid #00ff99;
  border-radius: 12px;
}

/* خط متحرك */
.line {
  position: absolute;
  width: 100%;
  height: 3px;
  background: red;
  animation: move 1.2s infinite;
}

@keyframes move {
  0% { top: 0; }
  50% { top: 100%; }
  100% { top: 0; }
}

#status {
  position: absolute;
  bottom: 20px;
  width: 100%;
}
</style>
</head>

<body>

<video id="video" autoplay></video>

<div class="box">
  <div class="line"></div>
</div>

<p id="status">وجه الكاميرا نحو QR</p>

<canvas id="canvas" hidden></canvas>

<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<script>

const video = document.getElementById("video");
const status = document.getElementById("status");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let lastResult = null;
let lastTime = 0;
let scanning = true;

/* تشغيل الكاميرا */
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
})
.then(stream => {
  video.srcObject = stream;
});

/* المسح السريع */
function scanQR() {

  if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, canvas.width, canvas.height);

    if (code) {

      const now = Date.now();

      // منع التكرار لنفس الكود خلال 2 ثانية
      if (code.data !== lastResult || now - lastTime > 2000) {

        lastResult = code.data;
        lastTime = now;

        scanning = false;

        status.innerText = "تم القراءة ✔ " + code.data;

        sendToAPI(code.data);

        // إعادة تفعيل المسح بعد 1.5 ثانية
        setTimeout(() => {
          scanning = true;
          status.innerText = "جاهز للمسح مرة أخرى...";
        }, 1500);
      }

    } else {
      status.innerText = "جاري البحث...";
    }
  }

  requestAnimationFrame(scanQR);
}

/* API */
function sendToAPI(data) {

  fetch("https://example.com/api/qr", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ qr: data })
  })
  .then(res => {
    if (!res.ok) throw new Error("API error");
    status.innerText = "تم الإرسال ✔";
  })
  .catch(err => {
    status.innerText = "فشل الإرسال ❌ (سيتم إعادة المحاولة لاحقًا)";
  });
}

/* تشغيل المسح */
scanQR();

</script>

</body>
</html>
