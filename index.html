<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School QR Scanner</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
  text-align: center;
  overflow: hidden;
}

video {
  width: 100%;
  height: auto;
}

/* إطار المسح */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 240px;
  height: 240px;
  transform: translate(-50%, -50%);
  border: 2px solid #00ff99;
  border-radius: 12px;
  box-shadow: 0 0 15px #00ff99;
}

/* خط متحرك */
.line {
  position: absolute;
  width: 100%;
  height: 3px;
  background: red;
  animation: move 1.2s infinite;
}

@keyframes move {
  0% { top: 0; }
  50% { top: 100%; }
  100% { top: 0; }
}

/* فلاش نجاح/خطأ */
.flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  pointer-events: none;
}

.flash.green {
  background: rgba(0,255,0,0.3);
  animation: fade 0.5s;
}

.flash.red {
  background: rgba(255,0,0,0.3);
  animation: fade 0.5s;
}

@keyframes fade {
  from { opacity: 1; }
  to { opacity: 0; }
}

#status {
  position: absolute;
  bottom: 20px;
  width: 100%;
}
</style>
</head>

<body>

<video id="video" autoplay></video>

<div class="box">
  <div class="line"></div>
</div>

<div id="flash" class="flash"></div>

<p id="status">وجه الكاميرا نحو QR</p>

<canvas id="canvas" hidden></canvas>

<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<script>

const video = document.getElementById("video");
const status = document.getElementById("status");
const flash = document.getElementById("flash");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let scanning = true;
let lastTime = 0;
let lastData = "";

/* 🎵 أصوات */
const successSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const errorSound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

/* تشغيل الكاميرا */
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
})
.then(stream => {
  video.srcObject = stream;
});

/* فلاش الشاشة */
function flashScreen(color) {
  flash.className = "flash " + color;
  setTimeout(() => {
    flash.className = "flash";
  }, 500);
}

/* مسح QR */
function scan() {

  if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, canvas.width, canvas.height);

    if (code) {

      const now = Date.now();

      if (code.data !== lastData || now - lastTime > 2000) {

        lastData = code.data;
        lastTime = now;

        scanning = false;

        status.innerText = "تم قراءة QR ✔";

        successSound.play();
        flashScreen("green");

        if (navigator.vibrate) {
          navigator.vibrate([200, 100, 200]);
        }

        sendAPI(code.data);

        setTimeout(() => {
          scanning = true;
          status.innerText = "جاهز للمسح مرة أخرى...";
        }, 1500);
      }

    } else {
      status.innerText = "جاري البحث...";
    }
  }

  requestAnimationFrame(scan);
}

/* إرسال API */
function sendAPI(data) {

  fetch("https://example.com/api/qr", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ qr: data })
  })
  .then(res => {

    if (!res.ok) throw new Error("API error");

    status.innerText = "تم الحفظ ✔";
    successSound.play();
    flashScreen("green");

  })
  .catch(err => {

    status.innerText = "فشل الإرسال ❌";
    errorSound.play();
    flashScreen("red");

  });
}

/* تشغيل المسح */
scan();

</script>

</body>
</html>
