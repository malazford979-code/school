<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scanner Pro</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #000;
  color: white;
  text-align: center;
}

/* Camera */
video {
  width: 100%;
  height: auto;
}

/* Scanner frame */
.scan-box {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 250px;
  height: 250px;
  transform: translate(-50%, -50%);
  border: 3px solid #00ff99;
  border-radius: 15px;
  box-shadow: 0 0 20px #00ff99;
  overflow: hidden;
}

/* Animated line */
.scan-line {
  position: absolute;
  width: 100%;
  height: 3px;
  background: red;
  animation: move 2s infinite;
}

@keyframes move {
  0% { top: 0; }
  50% { top: 100%; }
  100% { top: 0; }
}

.status {
  position: absolute;
  bottom: 20px;
  width: 100%;
}
</style>
</head>

<body>

<video id="video" autoplay></video>

<div class="scan-box">
  <div class="scan-line"></div>
</div>

<div class="status" id="status">وجه الكاميرا نحو QR</div>

<canvas id="canvas" hidden></canvas>

<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<script>
const video = document.getElementById("video");
const status = document.getElementById("status");

let scanned = false;

/* أصوات */
const successSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const errorSound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

/* تشغيل الكاميرا */
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  status.innerText = "فشل تشغيل الكاميرا";
});

/* Canvas */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

/* فحص QR */
setInterval(() => {
  if (video.readyState === video.HAVE_ENOUGH_DATA && !scanned) {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, canvas.width, canvas.height);

    if (code) {
      scanned = true;
      status.innerText = "تم قراءة QR ✔";

      successSound.play();

      // إرسال وهمي API
      sendAPI(code.data);

    } else {
      status.innerText = "جاري البحث...";
    }
  }
}, 400);

/* API */
function sendAPI(data) {

  fetch("https://example.com/api/qr", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ qr: data })
  })
  .then(res => {
    if (!res.ok) throw new Error("API Error");

    status.innerText = "تم الإرسال بنجاح ✔";
    successSound.play();

    setTimeout(() => scanned = false, 2000);
  })
  .catch(err => {
    status.innerText = "فشل الإرسال ❌";
    errorSound.play();

    setTimeout(() => scanned = false, 2000);
  });
}
</script>

</body>
</html>
